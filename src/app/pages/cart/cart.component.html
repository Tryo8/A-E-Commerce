<section class="p-3">
  <h5 class="text-500 mb-3 ">YOUR CART</h5>

  <div class="flex flex-column align-items-center justify-content-center gap-3">
    @if(allCartProducts.length > 0){
        <ng-container>
            @for(product of pagedCart; track $index){
                <div class="flex flex-column md:flex-row align-items-center gap-4 shadow-2 hover:shadow-3 border-round-2xl p-3 w-full md:w-9 lg:w-8">
                <img
                [src]="product.image" 
                [alt]="product.title"
                height="170"
                class="w-full md:w-10rem border-round"
                style="object-fit: contain;"
                />

                <div class="flex flex-column text-left md:text-left gap-2 w-full">
                <h2 class="text-xl font-bold mb-1 text-overflow-ellipsis" >
                    {{ product.title | slice: 0 : 66}}
                    <span
                    class="bg-yellow-400 text-white text-xs font-bold p-1 border-round-xl ml-2"
                    >
                    {{ product.rating.rate }}
                    <i class="pi pi-star-fill" style="font-size: 0.6rem"></i>
                    </span>
                </h2>

                <h5 class="text-sm text-500 mt-1">Description</h5>
                <p class="mb-3 text-sm text-color-secondary line-height-3">
                    {{ product.description }}
                </p>

                <div class="flex justify-content-between align-items-center">
                    <h4 class="text-green-600 font-semibold text-lg m-0">
                    ${{ product.price }}
                    </h4>

                    <button (click)="removeFromCart(product.id)" pButton [rounded]="true" icon="pi pi-trash" label="Remove" class="p-button-danger p-button-sm"

                    ></button>
                </div>
                </div>
            </div>
            }
        </ng-container>
        <div class="flex flex-column w-full md:w-9 lg:w-8">
            <button (click)="clearCart()" pButton [rounded]="true" icon="pi pi-cart-minus"label="Remove All" severity="danger"></button>

        </div>
    } @else {
        <div class="flex align-items-center justify-content-center mt-4 text-center w-full">
            <div class="p-1  align-items-center w-full">
                <img src="./assets/imgs/shopping-cart.png" style="object-fit: contain; max-height: 160px;"/>
                  <h5 class="text-500 text-center">
                 There are no products in your cart
            </h5>
            </div>
           
        </div>
    }

    <p-paginator
        [rows]="rows"
        [totalRecords]="allCartProducts.length"
        (onPageChange)="onPageChange($event)"
        styleClass="mt-4"
      ></p-paginator>


  </div>
</section>
